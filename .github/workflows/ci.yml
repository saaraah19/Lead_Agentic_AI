name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        # --exit-zero so style nits don't fail the build yet — flip this
        # once the codebase has been run through ruff once and cleaned up.
        run: ruff check . --exit-zero

      - name: Run tests
        env:
          GEMINI_API_KEY: ci-placeholder-key-not-used
        run: pytest tests/ -v
